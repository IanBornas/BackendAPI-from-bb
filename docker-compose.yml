services:

  kafka:
    image: apache/kafka:3.7.0
    container_name: backend-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  mysql:
    image: mysql:8.0
    container_name: backend-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: My81ack80r&
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pMy81ack80r&"]
      interval: 10s
      timeout: 5s
      retries: 10

  sbuserms:
    build:
      context: ./user/sbuserms
      dockerfile: Dockerfile
    container_name: sbuserms
    restart: unless-stopped
    ports:
      - "8080:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userdb?allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: My81ack80r&
    depends_on:
      mysql:
        condition: service_healthy

  sbconvms:
    build:
      context: ./conv/sbconvms
      dockerfile: Dockerfile
    container_name: sbconvms
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/convdb?allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: My81ack80r&
    depends_on:
      mysql:
        condition: service_healthy

  sbmessms:
    build:
      context: ./mess/sbmessms
      dockerfile: Dockerfile
    container_name: sbmessms
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/messdb?allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: My81ack80r&
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  mysql-data:
  kafka-data:
