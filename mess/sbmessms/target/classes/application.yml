
server: 
   port: 8081
spring: 
   datasource: 
      url: jdbc:mysql://localhost:3306/messdb?allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false
      username: root
      password: admin
      driver-class-name: com.mysql.cj.jdbc.Driver
   jpa: 
      show-sql: true
      properties: 
         hibernate: 
            dialect: org.hibernate.dialect.MySQL5InnoDBDialect
      hibernate: 
         naming: 
            implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
            physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
         ddl-auto: update
   servlet: 
      multipart: 
         enabled: true
         file-size-threshold: 2KB
         max-file-size: 200MB
         max-request-size: 215MB
   http: 
      multipart: 
         enabled: true
         location: upload
   kafka:
      bootstrap-servers: localhost:9092
      producer:
         key-serializer: org.apache.kafka.common.serialization.StringSerializer
         value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      consumer:
         group-id: chat-message-group
         auto-offset-reset: earliest
         key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
         value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
         properties:
            spring.json.trusted.packages: "com.gabriel.messms.kafka"
            spring.json.value.default.type: "com.gabriel.messms.kafka.MessageCreatedEvent"
file: 
   upload: 
      location: ..\\upload-dir
logging: 
   level: 
      com: 
         gabriel: 
            pricems: TRACE
